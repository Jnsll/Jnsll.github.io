<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Abstract AGORA-6G network illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b4332"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00b4d8"/>
      <stop offset="100%" stop-color="#90e0ef"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a9d8f" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#52b788" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>

  <!-- abstract field layers -->
  <path d="M0,520 C220,460 430,580 620,520 C790,470 980,560 1200,500 L1200,700 L0,700 Z" fill="url(#field)"/>
  <path d="M0,570 C180,520 410,620 620,570 C820,520 1030,620 1200,580 L1200,700 L0,700 Z" fill="#40916c" fill-opacity="0.22"/>

  <!-- central tower -->
  <rect x="585" y="250" width="30" height="260" rx="6" fill="#ced4da"/>
  <circle cx="600" cy="230" r="16" fill="#e9ecef"/>
  <rect x="593" y="205" width="14" height="18" rx="3" fill="#adb5bd"/>

  <!-- network arcs -->
  <path d="M430,410 A220,220 0 0,1 770,410" fill="none" stroke="url(#ring)" stroke-width="6" stroke-linecap="round"/>
  <path d="M360,455 A300,300 0 0,1 840,455" fill="none" stroke="#48cae4" stroke-opacity="0.85" stroke-width="5" stroke-linecap="round"/>
  <path d="M290,500 A380,380 0 0,1 910,500" fill="none" stroke="#90e0ef" stroke-opacity="0.75" stroke-width="4" stroke-linecap="round"/>

  <!-- distributed nodes -->
  <circle cx="420" cy="440" r="9" fill="#caf0f8"/>
  <circle cx="500" cy="390" r="9" fill="#caf0f8"/>
  <circle cx="700" cy="390" r="9" fill="#caf0f8"/>
  <circle cx="780" cy="440" r="9" fill="#caf0f8"/>
  <circle cx="320" cy="530" r="9" fill="#caf0f8"/>
  <circle cx="880" cy="530" r="9" fill="#caf0f8"/>

  <!-- abstract data links -->
  <line x1="420" y1="440" x2="500" y2="390" stroke="#ade8f4" stroke-width="2" stroke-opacity="0.9"/>
  <line x1="700" y1="390" x2="780" y2="440" stroke="#ade8f4" stroke-width="2" stroke-opacity="0.9"/>
  <line x1="500" y1="390" x2="600" y2="320" stroke="#ade8f4" stroke-width="2" stroke-opacity="0.9"/>
  <line x1="600" y1="320" x2="700" y2="390" stroke="#ade8f4" stroke-width="2" stroke-opacity="0.9"/>

  <!-- subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="620" x2="1200" y2="620"/>
    <line x1="0" y1="660" x2="1200" y2="660"/>
    <line x1="120" y1="510" x2="120" y2="700"/>
    <line x1="240" y1="500" x2="240" y2="700"/>
    <line x1="360" y1="490" x2="360" y2="700"/>
    <line x1="480" y1="500" x2="480" y2="700"/>
    <line x1="600" y1="490" x2="600" y2="700"/>
    <line x1="720" y1="500" x2="720" y2="700"/>
    <line x1="840" y1="490" x2="840" y2="700"/>
    <line x1="960" y1="500" x2="960" y2="700"/>
    <line x1="1080" y1="510" x2="1080" y2="700"/>
  </g>
</svg>
